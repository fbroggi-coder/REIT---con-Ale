<script>

// ═══════════════════════════════════════════════════════════════════
// CONFIGURACIÓN — editar aquí cuando cambia el PDF

const SB_URL = 'https://xyoxonwufbrorwsoyyce.supabase.co/rest/v1';

const SB_HDR = { 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY };

// Nombre de la tabla de activos para cada fondo
const ACTIVOS_TABLE = {
  REIT:       'activos_reit',
  PNIZF:      'activos_pnizf',
  CICLO_NOVA: 'activos_ciclo_nova',
};

// Ajustes contables por fondo (cambian con cada PDF — editar acá)
const AJUSTES = {
  REIT: [
    { label: '(+) Disponibilidades',              val:  11745979.95 },
    { label: '(+) Gastos diferidos (honorarios)', val: 802559737.10 },
    { label: '(−) Provisiones',                   val: -346226999.68 },
    { label: '(−) Acreedores por operaciones',    val:  -1145256.81 },
  ],
  PNIZF: [
    { label: '(+) Disponibilidades',             val:  34529010.16 },
    { label: '(+) Otros créditos no corrientes', val: 185839020.46 },
    { label: '(+) Bienes de cambio',             val: 29256797700.48 },
    { label: '(+) Cuenta overnight',             val:    834455.56 },
    { label: '(+) Rentas a cobrar',              val:   1144084.44 },
    { label: '(−) Provisiones',                  val:    -60531.24 },
    { label: '(−) Acreedores por operaciones',   val: -12074511.17 },
    { label: '(−) Honorarios a pagar',           val:     -7281.68 },
  ],
  CICLO_NOVA: [],
};

// FUNDS_CONFIG se construye en init() a partir de la tabla `funds` de Supabase.
// Acá solo guardamos lo que no viene de ahí (los ajustes).
let FUNDS_CONFIG = {};

// ═══════════════════════════════════════════════════════════════════
// LÓGICA DE PRECIOS — basada en fuente_precio + moneda del fondo
// ═══════════════════════════════════════════════════════════════════

// Mapeo fuente_id → kind interno
const FUENTE_KIND = {
  'data912_arg_bonds':     'market',
  'data912_arg_corp':      'market',
  'data912_arg_notes':     'market',
  'data912_arg_stocks':    'market',
  'data912_arg_cedears':   'market',
  'data912_arg_options':   'market',
  'data912_us_stocks':     'usMarket',
  'data912_us_adrs':       'usMarket',
  'calculo MM usd':        'mmUsd',
  'calculo devengamiento': 'devengo',
  'calculo MM ars':        'mmArs',
  'devengamiento ARS':     'devengoARS',
  'globo':                 'hold',
  'hold':                  'hold',
  'yahoo':                 'yahoo',
};

// Días hábiles hasta liquidación (para devengamiento)
function nextBizDays() {
  const ar = new Date(new Date().toLocaleString('en-US', { timeZone: 'America/Argentina/Buenos_Aires' }));
  const hour = ar.getHours();
  let d = new Date(ar);
  if (hour >= 18) d.setDate(d.getDate() + 1);
  const dow = d.getDay();
  if (dow === 6) return 3;
  if (dow === 0) return 2;
  return 1;
}

// ── calcPrecio ───────────────────────────────────────────────────────
// Devuelve { price, live } donde `price` está expresado en la moneda
// del fondo (ARS para fondos ARS, USD para fondos USD).
//
// fondoMoneda: 'ARS' | 'USD'
// fxLive:  MEP hoy   (data912)
// fxAyer:  MEP ayer  (fx_history)
//
// Fondos ARS — los instrumentos USD se convierten a ARS vía MEP:
//   market ARS  → precio data912 (ya en ARS)
//   mmUsd       → cierre × MEP_hoy / MEP_ayer
//   devengo     → cierre × (1+TNA/365×n) × MEP_hoy / MEP_ayer
//   devengoARS  → cierre × (1+TNA/365×n)   (ya es ARS puro)
//
// Fondos USD — los instrumentos ARS se convierten a USD vía MEP:
//   market ARS  → precio data912 / MEP_hoy
//   usMarket    → precio USA × canje  (canje = CCL/MEP para pasar cable→MEP)
//   mmUsd       → cierre  (ya está en USD, no cambia)
//   devengo     → cierre × (1+TNA/365×n)  (devenga en USD)
//   devengoARS  → cierre × (1+TNA/365×n) / MEP_hoy  (ARS→USD)
//
function calcPrecio(h, meta, fondoMoneda, fxLive, fxAyer, marketMap, usMap, canje, yahooMap) {
  const kind   = meta?.kind   || 'hold';
  const tipo   = meta?.tipo   || '';
  const tasa   = meta?.tasa   ?? null;
  const lamina = meta?.lamina || 1;
  const sym    = meta?.liveSymbol || h.ticker;
  const fxNow  = fxLive || fxAyer || 0;
  const fxB    = fxAyer || fxNow;
  const n      = nextBizDays();
  const base   = h.cierre * lamina;

  // ── MERCADO LOCAL (bonos AR, letras, CEDEARs, acciones AR, opciones) ─
  if (kind === 'market') {
    const raw  = marketMap?.[sym];
    let liveP  = null;
    if (raw && raw.c > 0) {
      if (fondoMoneda === 'USD') {
        // En fondo USD el cierre del PDF está en USD pero data912 devuelve ARS.
        // No comparar escalas — usar data912 directo (se divide por MEP más abajo).
        liveP = raw.c;
      } else if (base > 0) {
        // Fondo ARS: ambos en ARS, validar escala con candidatos ×1 / ÷100 / ×100
        const cands = [raw.c, raw.c / 100, raw.c * 100];
        const best  = cands.reduce((a, b) =>
          Math.abs(Math.log(b / base)) < Math.abs(Math.log(a / base)) ? b : a
        );
        liveP = Math.abs(best / base - 1) <= 0.40 ? best : null;
      }
    }
    const priceARS = liveP ?? base;
    const live     = liveP != null;
    if (fondoMoneda === 'USD') {
      // HD: data912 devuelve precio directo en USD (hard dollar)
      if (tipo.includes('HD'))
        return { price: priceARS, live };
      // DL / ARS: precio en ARS → convertir a USD vía MEP
      return { price: fxNow > 0 ? priceARS / fxNow : h.cierre, live: live && fxNow > 0 };
    }
    return { price: priceARS, live };
  }

  // ── ACCIONES / ADRs USA (precio en USD cable) ────────────────────
  if (kind === 'usMarket') {
    const raw = usMap?.[sym];
    if (raw && raw.c > 0 && raw.v > 0) {
      const priceUSD = raw.c;
      if (fondoMoneda === 'USD')
        // Precio USD cable → USD MEP dividiendo por canje (CCL/MEP)
        return { price: canje > 0 ? priceUSD / canje : priceUSD, live: canje > 0 };
      // Fondo ARS: USD cable → ARS vía CCL
      return { price: priceUSD * fxNow * canje, live: fxNow > 0 };
    }
    return { price: base, live: false };
  }

  // ── MONEY MARKET USD / Pagaré USD (devenga en USD) ───────────────
  if (kind === 'mmUsd') {
    if (tasa == null) return { price: base, live: false };
    const devengado = base * (1 + tasa / 100 / 365 * n);
    if (fondoMoneda === 'USD')
      return { price: devengado, live: true };
    // Fondo ARS: ajustar por variación de MEP
    if (fxB > 0)
      return { price: devengado * (fxNow / fxB), live: fxNow > 0 };
    return { price: devengado, live: true };
  }

  // ── DEVENGAMIENTO USD (legacy) ────────────────────────────────────
  if (kind === 'devengo') {
    if (tasa == null) return { price: base, live: false };
    const devengado = base * (1 + tasa / 100 / 365 * n);
    if (fondoMoneda === 'USD')
      return { price: devengado, live: true };
    if (fxB > 0)
      return { price: devengado * (fxNow / fxB), live: fxNow > 0 };
    return { price: devengado, live: true };
  }

  // ── MONEY MARKET ARS / Pagaré ARS (devenga en ARS) ──────────────
  if (kind === 'mmArs') {
    if (tasa == null) return { price: base, live: false };
    const devengado = base * (1 + tasa / 100 / 365 * n);
    if (fondoMoneda === 'ARS')
      return { price: devengado, live: true };
    // Fondo USD: base en USD → devengado * MEP_ayer / MEP_hoy
    if (fxNow > 0 && fxB > 0)
      return { price: devengado * fxB / fxNow, live: true };
    if (fxNow > 0)
      return { price: devengado / fxNow, live: true };
    return { price: base, live: false };
  }

  // ── DEVENGAMIENTO ARS puro ───────────────────────────────────────
  if (kind === 'devengoARS') {
    if (tasa == null) return { price: base, live: false };
    const devengado = base * (1 + tasa / 100 / 365 * n);
    if (fondoMoneda === 'ARS')
      return { price: devengado, live: true };
    if (fxNow > 0)
      return { price: devengado / fxNow, live: true };
    return { price: base, live: false };
  }

  // ── YAHOO FINANCE (acciones USA sin precio en data912) ──────────
  if (kind === 'yahoo') {
    const yPrice = yahooMap?.[sym];
    if (yPrice > 0) {
      return { price: canje > 0 ? yPrice / canje : yPrice, live: true };
    }
    return { price: base, live: false };
  }

  // ── HOLD / fallback ──────────────────────────────────────────────
  return { price: base, live: false };
}

// ═══════════════════════════════════════════════════════════════════
// CÁLCULO DE NAV
// ═══════════════════════════════════════════════════════════════════

function calcNAV(fundId) {
  const cfg      = FUNDS_CONFIG[fundId];
  if (!cfg) return { totalInv: 0, ajusteSum: 0, pnBruto: 0, honorario: 0, pn: 0, navLive: 0, rend: 0 };
  const holdings  = state.holdings[fundId] || [];
  const meta      = state.meta[fundId] || {};
  const moneda    = cfg.moneda || 'ARS';
  let totalInv    = 0;

  for (const h of holdings) {
    const m = meta[h.ticker];
    // Los futuros de dólar no suman al PN
    if (m?.tipo === 'Futuro de Dólar') continue;
    const { price } = calcPrecio(h, m, moneda, state.fxLive, state.fxAyer, state.marketMap, state.usMap, state.canje, state.yahooMap);
    const lamina = m?.lamina || 1;
    totalInv += h.cantidad * (price / lamina);
  }

  const ajustes   = AJUSTES[fundId] || [];
  const ajusteSum = ajustes.reduce((s, a) => s + a.val, 0);
  const pnBruto   = totalInv + ajusteSum;
  // PNIZF ya incluye honorarios en los ajustes del PDF → no restar el calculado
  const honorario = fundId === 'PNIZF' ? 0 : pnBruto * (cfg.feeAnual || 0) / 365;
  const pn        = pnBruto - honorario;
  // CICLO_NOVA: cuotapartes del PDF están expresadas en milésimas → × 1000
  const navLive   = cfg.cuotapartes > 0
    ? (pn / cfg.cuotapartes) * (fundId === 'CICLO_NOVA' ? 1000 : 1)
    : 0;
  const rend      = cfg.navCierre   > 0 ? navLive / cfg.navCierre - 1 : 0;

  return { totalInv, ajusteSum, pnBruto, honorario, pn, navLive, rend };
}

async function sbGet(path) {
  const r = await fetch(SB_URL + path, { headers: SB_HDR });
  if (!r.ok) throw new Error('Supabase ' + r.status + ': ' + path);
  return r.json();
}

// Carga la tabla `funds` de Supabase y construye FUNDS_CONFIG
async function cargarFunds() {
  const rows = await sbGet('/funds?select=id,nombre,moneda,color,cuotapartes,nav_cierre,pn_cierre,fee_anual,pdf_date,ajustes');
  const config = {};
  for (const r of rows) {
    config[r.id] = {
      id:          r.id,
      nombre:      r.nombre,
      moneda:      r.moneda || 'ARS',
      color:       r.color  || '#A6E635',
      cuotapartes: parseFloat(r.cuotapartes) || 0,
      navCierre:   parseFloat(r.nav_cierre)  || 0,
      pnCierre:    parseFloat(r.pn_cierre)   || 0,
      feeAnual:    parseFloat(r.fee_anual)   || 0.0168,
      pdfDate:     r.pdf_date || '',
    };
    // Cargar ajustes persistidos desde Supabase (sobreescribe los hardcodeados)
    if (Array.isArray(r.ajustes) && r.ajustes.length > 0) {
      AJUSTES[r.id] = r.ajustes;
    }
  }
  return config;
}

// Carga los activos de la tabla específica de cada fondo
// Devuelve { [fundId]: { [ticker]: metaEntry } }
async function cargarMeta() {
  const meta = {};
  await Promise.all(
    Object.entries(ACTIVOS_TABLE).map(async ([fundId, tabla]) => {
      try {
        const rows = await sbGet(`/${tabla}?select=ticker,nombre,tipo_activo,categoria,moneda,fuente_precio,live_symbol,tasa,lamina,base`);
        const fondoMeta = {};
        for (const r of rows) {
          const fuente = r.fuente_precio || 'hold';
          const kind   = FUENTE_KIND[fuente] || 'hold';
          const entry  = {
            denom:      r.nombre     || r.ticker,
            tipo:       r.tipo_activo || 'Otros',
            categoria:  r.categoria  || '',
            moneda:     r.moneda     || 'ARS',
            fuente,
            kind,
            liveSymbol: r.live_symbol || r.ticker,
            tasa:       r.tasa   != null ? parseFloat(r.tasa)   : null,
            lamina:     r.lamina != null ? parseFloat(r.lamina)
                                        : (fuente.startsWith('data912') ? 100 : 1),
            base:       r.base   != null ? parseFloat(r.base)   : 0,
          };
          fondoMeta[r.ticker] = entry;
          if (r.live_symbol && r.live_symbol !== r.ticker) fondoMeta[r.live_symbol] = entry;
        }
        meta[fundId] = fondoMeta;
      } catch (e) {
        console.warn(`[iEB] No se pudo cargar ${tabla}:`, e.message);
        meta[fundId] = {};
      }
    })
  );
  return meta;
}

async function cargarHoldings() {
  try {
    const rows = await sbGet('/holdings?select=fund_id,ticker,cantidad,cierre&order=fund_id.asc');
    const out = {};
    for (const r of rows) {
      if (!out[r.fund_id]) out[r.fund_id] = [];
      out[r.fund_id].push({
        ticker:   r.ticker,
        cantidad: parseFloat(r.cantidad),
        cierre:   parseFloat(r.cierre),
      });
    }
    return out;
  } catch (e) {
    console.warn('[iEB] cargarHoldings error:', e.message);
    return {};
  }
}

async function cargarFxAyer() {
  try {
    const hoy = new Date().toISOString().slice(0, 10);
    const rows = await sbGet('/fx_history?fecha=lt.' + hoy + '&order=fecha.desc&limit=1');
    if (rows.length > 0) return { mep: parseFloat(rows[0].mep) || 0, ccl: parseFloat(rows[0].ccl) || 0 };
    return { mep: 0, ccl: 0 };
  } catch (e) {
    console.warn('[iEB] cargarFxAyer error:', e.message);
    return { mep: 0, ccl: 0 };
  }
}

async function actualizarPrecios() {
  if (state.updatingPrices) return;
  state.updatingPrices = true;
  render();
  try {
    const live = await fetchLivePrecios();
    state.fxLive          = live.fxLive;
    state.canje           = live.canje;
    state.marketMap       = live.marketMap;
    state.usMap           = live.usMap;
    state.yahooMap        = live.yahooMap || {};
    state.lastPriceUpdate = new Date();
  } finally {
    state.updatingPrices = false;
    render();
  }
}

async function fetchLivePrecios() {
  try {
    const [bonds, corp, notes, mepArr, cclArr, cedears, options, stocks] = await Promise.all([
      fetch('https://data912.com/live/arg_bonds').then(r => r.json()).catch(() => []),
      fetch('https://data912.com/live/arg_corp').then(r => r.json()).catch(() => []),
      fetch('https://data912.com/live/arg_notes').then(r => r.json()).catch(() => []),
      fetch('https://data912.com/live/mep').then(r => r.json()).catch(() => []),
      fetch('https://data912.com/live/ccl').then(r => r.json()).catch(() => []),
      fetch('https://data912.com/live/arg_cedears').then(r => r.json()).catch(() => []),
      fetch('https://data912.com/live/arg_options').then(r => r.json()).catch(() => []),
      fetch('https://data912.com/live/arg_stocks').then(r => r.json()).catch(() => []),
    ]);

    // Market map (bonos, corporativos, letras, cedears, opciones, acciones — todos en ARS)
    const marketMap = {};
    for (const arr of [bonds, corp, notes, cedears, options, stocks]) {
      for (const o of (arr || [])) {
        if (o && o.symbol) marketMap[o.symbol] = o;
      }
    }

    // MEP y CCL
    const mepMap = {}, cclMap = {};
    for (const o of (mepArr || [])) { if (o && o.ticker) mepMap[o.ticker] = o; }
    for (const o of (cclArr || [])) { if (o && o.ticker) cclMap[o.ticker] = o; }

    const mepRow = mepMap['AL30'] || mepMap['GD30'] || mepMap['AL30D'];
    const cclRow = cclMap['AL30'] || cclMap['GD30'] || cclMap['AL30C'];
    const fxLive  = mepRow ? (mepRow.mark || mepRow.close || 0) : 0;
    const fxCCL   = cclRow ? (cclRow.mark || cclRow.close || 0) : 0;
    const canje   = fxLive > 0 && fxCCL > 0 ? fxCCL / fxLive : 1;

    // USA stocks (para fondos USD)
    const [usStk, usAdr] = await Promise.all([
      fetch('https://data912.com/live/usa_stocks').then(r => r.json()).catch(() => []),
      fetch('https://data912.com/live/usa_adrs').then(r => r.json()).catch(() => []),
    ]);
    const usMap = {};
    for (const arr of [usStk, usAdr]) {
      for (const o of (arr || [])) { if (o && o.symbol) usMap[o.symbol] = o; }
    }

    // ── YAHOO FINANCE ──────────────────────────────────────────────
    const yahooSymbols = [...new Set(
      Object.values(state.meta)
        .flatMap(m => Object.values(m))
        .filter(e => e.kind === 'yahoo' && e.liveSymbol)
        .map(e => e.liveSymbol)
    )];
    const yahooMap = {};
    if (yahooSymbols.length > 0) {
      try {
        const yUrl = 'https://xyoxonwufbrorwsoyyce.supabase.co/functions/v1/yahoo-prices';
        const yData = await fetch(yUrl, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'apikey': SB_KEY, 'Authorization': 'Bearer ' + SB_KEY },
          body: JSON.stringify({ symbols: yahooSymbols }),
        }).then(r => r.json()).catch(() => null);
        if (yData?.quoteResponse?.result) {
          for (const q of yData.quoteResponse.result) {
            if (q.symbol && q.regularMarketPrice > 0) {
              yahooMap[q.symbol] = q.regularMarketPrice;
              console.log('[Yahoo]', q.symbol, '=', q.regularMarketPrice, 'USD');
            }
          }
        }
      } catch(e) {
        console.warn('[iEB] Yahoo Finance error:', e);
      }
    }

    return { fxLive, canje, marketMap, usMap, yahooMap };
  } catch (e) {
    console.warn('[iEB] fetchLivePrecios error:', e);
    return { fxLive: 0, canje: 1, marketMap: {}, usMap: {} };
  }
}

const _ar2 = new Intl.NumberFormat('es-AR', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const _ar4 = new Intl.NumberFormat('es-AR', { minimumFractionDigits: 4, maximumFractionDigits: 4 });
const _ar0 = new Intl.NumberFormat('es-AR', { maximumFractionDigits: 0 });
const _arN = new Intl.NumberFormat('es-AR', { maximumFractionDigits: 2 });

const f2   = n => _ar2.format(n);
const f4   = n => _ar4.format(n);
const fARS = n => '$ ' + _ar0.format(Math.round(n));
const fNum = n => _arN.format(n);
const fPct = n => {
  if (Math.abs(n) < 5e-5) n = 0;
  return (n > 0 ? '+' : '') + _ar2.format(n * 100) + '%';
};

function render() {
  const root = document.getElementById('app');
  if (state.loading) {
    root.innerHTML = `<div class="center-msg"><div class="spinner"></div><span>Cargando datos…</span></div>`;
    return;
  }
  if (state.error) {
    root.innerHTML = `<div class="center-msg"><span style="color:#D33A3F">Error: ${state.error}</span></div>`;
    return;
  }
  if (state.view === 'landing') {
    root.innerHTML = renderLanding();
  } else if (state.view === 'activos') {
    root.innerHTML = renderActivosPage(state.fundId);
    bindEvents();
    cargarActivosTabla(state.fundId);
    return;
  } else {
    root.innerHTML = renderFondo(state.fundId);
  }
  bindEvents();
}

// ── MONTOS AJUSTADOS POR NOCIONAL DE OPCIONES (solo CICLO_NOVA) ──────
// Para Compra/Venta/Covered Call: montoDisplay = monto + cantidad × base
// El exceso nocional se descuenta en partes iguales de los MM USD.
const OPTION_TIPOS = ['Compra Call', 'Venta Call', 'Covered Call'];

function calcMontosCartera(fundId) {
  const cfg       = FUNDS_CONFIG[fundId];
  const holdings  = state.holdings[fundId] || [];
  const fondoMeta = state.meta[fundId]    || {};
  const moneda    = cfg?.moneda || 'ARS';
  const applyAdj  = fundId === 'CICLO_NOVA';

  const items = holdings.map(h => {
    const meta   = fondoMeta[h.ticker];
    const { price } = calcPrecio(h, meta, moneda, state.fxLive, state.fxAyer, state.marketMap, state.usMap, state.canje, state.yahooMap);
    const lamina  = meta?.lamina || 1;
    const monto   = h.cantidad * (price / lamina);
    const tipo    = meta?.tipo || 'Otros';
    const isOpt   = applyAdj && OPTION_TIPOS.includes(tipo);
    const notional = isOpt ? h.cantidad * (meta?.base || 0) : 0;
    return { ticker: h.ticker, meta, tipo, monto, notional, isOpt };
  });

  if (!applyAdj) return items.map(i => ({ ...i, montoDisplay: i.monto }));

  const totalNotional = items.reduce((s, i) => s + i.notional, 0);
  const mmUsdItems    = items.filter(i => i.tipo === 'Money Market USD');
  const mmUsdAdj      = mmUsdItems.length > 0 ? totalNotional / mmUsdItems.length : 0;

  return items.map(i => {
    const isShortCall = ['Covered Call', 'Venta Call'].includes(i.tipo);
    let montoDisplay = i.monto;
    if (i.isOpt)                           montoDisplay = i.monto + i.notional;
    else if (i.tipo === 'Money Market USD') montoDisplay = i.monto - mmUsdAdj;
    if (isShortCall) montoDisplay = -Math.abs(montoDisplay);
    return { ...i, montoDisplay };
  });
}

// ── BREAKDOWN ────────────────────────────────────────────────────────
function toggleBreakdown(mode) {
  state.breakdown = state.breakdown === mode ? null : mode;
  render();
}

function renderBreakdownPanel(fundId) {
  const mode = state.breakdown;
  if (!mode) return '';

  const { pn, totalInv } = calcNAV(fundId);
  if (pn <= 0) return '';

  const rawItems = calcMontosCartera(fundId);
  const items = rawItems.map(i => ({
    tipo:        i.meta?.tipo      || 'Otros',
    cat:         i.meta?.categoria || 'Sin categoría',
    monedaInstr: i.meta?.moneda    || 'ARS',
    monto:       i.montoDisplay,
  }));

  // Liquidez = PN - subtotal cartera (ajustes + honorarios netos)
  const liquidez     = pn - totalInv;
  const fondoMoneda  = FUNDS_CONFIG[fundId]?.moneda || 'ARS';

  const groups = {};

  if (mode === 'moneda') {
    for (const it of items) {
      if (it.tipo === 'Futuro de Dólar') {
        groups['ARS'] = (groups['ARS'] || 0) - it.monto;
        groups['USD'] = (groups['USD'] || 0) + it.monto;
      } else {
        groups[it.monedaInstr] = (groups[it.monedaInstr] || 0) + it.monto;
      }
    }
    // Liquidez en moneda del fondo
    if (liquidez !== 0) groups[fondoMoneda] = (groups[fondoMoneda] || 0) + liquidez;

  } else if (mode === 'tipo') {
    for (const it of items) {
      if (it.tipo === 'Futuro de Dólar') continue;
      groups[it.tipo] = (groups[it.tipo] || 0) + it.monto;
    }
    // Tipo: no se agrega liquidez (el usuario no lo pidió)

  } else {
    for (const it of items) {
      if (it.tipo === 'Futuro de Dólar') continue;
      groups[it.cat] = (groups[it.cat] || 0) + it.monto;
    }
    // Liquidez en categoría "Liquidez"
    if (liquidez !== 0) groups['Liquidez'] = (groups['Liquidez'] || 0) + liquidez;
  }

  const sorted  = Object.entries(groups).sort((a, b) => b[1] - a[1]);
  const maxAbs  = Math.max(...sorted.map(([, v]) => Math.abs(v)), 1);
  const COLORS  = ['#A6E635','#7C3AED','#2DD4BF','#F59E0B','#60A5FA','#F472B6','#34D399','#FB923C','#A78BFA','#94A3B8'];

  const rows = sorted.map(([label, val], i) => {
    const pct      = val / pn * 100;
    const barW     = Math.abs(val) / maxAbs * 100;
    const isNeg    = val < 0;
    const barColor = isNeg ? '#D33A3F' : COLORS[i % COLORS.length];
    return `
      <div style="display:flex;align-items:center;gap:12px;margin-bottom:10px">
        <div style="width:140px;font-size:12px;color:#C0C0C8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex-shrink:0">${label}</div>
        <div style="flex:1;background:#1E1E26;border-radius:4px;height:10px;overflow:hidden">
          <div style="width:${barW}%;height:100%;background:${barColor};border-radius:4px;transition:width 0.3s"></div>
        </div>
        <div style="width:52px;text-align:right;font-family:'JetBrains Mono',monospace;font-size:12px;font-weight:700;color:${isNeg ? '#D33A3F' : '#E5E5E7'}">${pct.toFixed(1)}%</div>
      </div>`;
  }).join('');

  return `
    <div style="background:#161618;border:1px solid rgba(255,255,255,0.08);border-radius:12px;padding:16px 20px;margin-bottom:16px">
      <div style="font-size:10px;font-weight:700;color:#5A5A60;text-transform:uppercase;letter-spacing:0.6px;margin-bottom:14px">
        ${{ moneda: 'Composición por Moneda', tipo: 'Composición por Tipo de Activo', cat: 'Composición por Categoría' }[mode]}
      </div>
      ${rows}
    </div>`;
}

// ── FONDO DETALLE ────────────────────────────────────────────────────
function renderFondo(fundId) {
  const cfg = FUNDS_CONFIG[fundId];
  if (!cfg) return `<div class="center-msg"><span>Fondo no encontrado</span></div>`;
  const { navLive, rend, pn, totalInv, ajusteSum, honorario } = calcNAV(fundId);
  const holdings  = state.holdings[fundId] || [];
  const fondoMeta = state.meta[fundId] || {};
  const moneda    = cfg.moneda || 'ARS';
  const pos = rend > 1e-5, neg = rend < -1e-5;
  const rendColor = pos ? '#A6E635' : (neg ? '#D33A3F' : '#9A9AA0');

  // ── Holdings rows ────────────────────────────────────────────────
  const tiposUnicos  = [...new Set(holdings.map(h => fondoMeta[h.ticker]?.tipo).filter(Boolean))].sort();
  const catsUnicas   = [...new Set(holdings.map(h => fondoMeta[h.ticker]?.categoria).filter(Boolean))].sort();
  const montosAjust  = calcMontosCartera(fundId); // mapa ticker → montoDisplay
  const montosMap    = Object.fromEntries(montosAjust.map(i => [i.ticker, i.montoDisplay]));

  const rows = holdings.map(h => {
    const meta   = fondoMeta[h.ticker];
    const instrMoneda = meta?.moneda || 'ARS';
    const { price, live } = calcPrecio(h, meta, moneda, state.fxLive, state.fxAyer, state.marketMap, state.usMap, state.canje, state.yahooMap);
    const lamina  = meta?.lamina || 1;

// ── FILTRO DE HOLDINGS ───────────────────────────────────────────────
function filtrarHoldings() {
  const ticker = (document.getElementById('flt-ticker')?.value || '').toLowerCase().trim();
  const tipo   = document.getElementById('flt-tipo')?.value  || '';
  const cat    = document.getElementById('flt-cat')?.value   || '';
  document.querySelectorAll('tr.holding-row').forEach(tr => {
    const okTicker = !ticker || tr.dataset.ticker.includes(ticker);
    const okTipo   = !tipo   || tr.dataset.tipo === tipo;
    const okCat    = !cat    || tr.dataset.cat  === cat;
    tr.style.display = (okTicker && okTipo && okCat) ? '' : 'none';
  });
}

// ── EVENTOS ──────────────────────────────────────────────────────────
function bindEvents() {
  document.querySelectorAll('[data-action]').forEach(el => {
    el.addEventListener('click', () => {
      const action = el.dataset.action;
      if (action === 'fondo') {
        state.view      = 'fund';
        state.fundId    = el.dataset.id;
        state.breakdown = null;
        render();
      } else if (action === 'landing') {
        state.view = 'landing';
        render();
      } else if (action === 'activos') {
        state.view   = 'activos';
        state.fundId = el.dataset.id || state.fundId;
        render();
      } else if (action === 'fund') {
        state.view = 'fund';
        render();
      }
    });
  });
}

async function init() {
  render(); // pantalla de carga

  try {
    const [fundsConfig, meta, holdings, fxAyer] = await Promise.all([
      cargarFunds(),
      cargarMeta(),
      cargarHoldings(),
      cargarFxAyer(),
    ]);
    FUNDS_CONFIG   = fundsConfig;
    state.meta     = meta;
    state.holdings = holdings;
    state.fxAyer    = fxAyer.mep;
    state.fxAyerCCL = fxAyer.ccl;
    state.loading   = false;
    render();

    const live = await fetchLivePrecios();
    state.fxLive          = live.fxLive;
    state.canje           = live.canje;
    state.marketMap       = live.marketMap;
    state.usMap           = live.usMap;
    state.yahooMap        = live.yahooMap || {};
    state.lastPriceUpdate = new Date();
    render();

    setInterval(async () => {
      const live = await fetchLivePrecios();
      state.fxLive          = live.fxLive;
      state.canje           = live.canje;
      state.marketMap       = live.marketMap;
      state.usMap           = live.usMap;
      state.yahooMap        = live.yahooMap || {};
      state.lastPriceUpdate = new Date();
      render();
    }, 10 * 60_000);

  } catch (e) {
    console.error('[iEB] init error:', e);
    state.loading = false;
    if (Object.keys(FUNDS_CONFIG).length === 0) {
      state.error = e.message;
    }
    render();
  }
}

let _pdfPending = null;

function loadPDFJS() {
  return new Promise((resolve, reject) => {
    if (window.pdfjsLib) { resolve(window.pdfjsLib); return; }
    const s = document.createElement('script');
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js';
    s.onload = () => {
      window.pdfjsLib.GlobalWorkerOptions.workerSrc =
        'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      resolve(window.pdfjsLib);
    };
    s.onerror = reject;
    document.head.appendChild(s);
  });
}

function showModal(html) {
  let el = document.getElementById('modal-overlay');
  if (!el) {
    el = document.createElement('div');
    el.id = 'modal-overlay';
    el.className = 'modal-overlay';
    document.body.appendChild(el);
  }
  el.innerHTML = html;
  el.style.display = 'flex';
  el.onclick = e => { if (e.target === el) closeModal(); };
}
function closeModal() {
  const el = document.getElementById('modal-overlay');
  if (el) el.style.display = 'none';
}

function parseArNum(s) {
  return parseFloat(String(s || '').trim().replace(/\./g, '').replace(',', '.')) || 0;
}

async function parsePDF(arrayBuffer) {
  const pdfjs = await loadPDFJS();
  const pdf   = await pdfjs.getDocument({ data: arrayBuffer }).promise;

  // ── Extraer ítems con posición, agrupar en líneas por y ───────────
  const allItems = [];
  for (let p = 1; p <= pdf.numPages; p++) {
    const page = await pdf.getPage(p);
    const vp   = page.getViewport({ scale: 1 });
    const tc   = await page.getTextContent();
    tc.items.forEach(it => {
      allItems.push({ text: it.str.trim(), x: Math.round(it.transform[4]),
                      y: Math.round(vp.height - it.transform[5]) + (p - 1) * 10000, pg: p });
    });
  }

  const lineMap = new Map();
  for (const item of allItems) {
    if (!item.text) continue;
    let placed = false;
    for (const [ky, arr] of lineMap) {
      if (Math.abs(ky - item.y) <= 3) { arr.push(item); placed = true; break; }
    }
    if (!placed) lineMap.set(item.y, [item]);
  }
  const lines = [...lineMap.entries()]
    .sort((a, b) => a[0] - b[0])
    .map(([y, items]) => ({
      y,
      text: items.sort((a, b) => a.x - b.x).map(i => i.text).filter(Boolean).join(' '),
      items: items.sort((a, b) => a.x - b.x),
    }));

  console.log('[PDF] páginas:', pdf.numPages, '| líneas:', lines.length);

  const res = { holdings: [], denomMap: {}, fecha: null, navCierre: null, cuotapartes: null, ajustes: [] };
  const numPat = /\d{1,3}(?:\.\d{3})*,\d+/g;
  const fullText = lines.map(l => l.text).join('\n');

  // Normaliza texto quitando acentos para comparaciones de patrones
  const norm = s => s.normalize('NFD').replace(/[̀-ͯ]/g, '').toUpperCase();

  // Detección temprana de formato
  const isCicloNovaPDF = fullText.includes('IsinCode') && !fullText.includes('Abreviatura');

  // Fecha
  const fechaM = fullText.match(/(\d{1,2}\/\d{1,2}\/\d{4})/);
  if (fechaM) res.fecha = fechaM[1];

  // NAV y cuotapartes
  if (isCicloNovaPDF) {
    // CICLO_NOVA: NAV desde "Valor del Día"
    const valorDiaLine = lines.find(l => /valor del d[íi]a/i.test(l.text));
    if (valorDiaLine) {
      const navNums = [...valorDiaLine.text.matchAll(numPat)].map(m => parseArNum(m[0])).filter(n => n > 0);
      if (navNums.length) {
        res.navCierre = navNums[navNums.length - 1];
        console.log('[PDF CICLO_NOVA] NAV cierre:', res.navCierre);
      }
    }
    // CICLO_NOVA: cuotapartes = Clase A + Clase B (última página)
    let cpTotal = 0;
    for (const l of lines) {
      if (/saldo total de cuotapartes/i.test(l.text)) {
        const nums = [...l.text.matchAll(numPat)].map(m => parseArNum(m[0])).filter(n => n > 0);
        if (nums.length) cpTotal += nums[nums.length - 1];
      }
    }
    if (cpTotal > 0) {
      res.cuotapartes = cpTotal;
      console.log('[PDF CICLO_NOVA] Cuotapartes total:', cpTotal);
    }
  } else {
    // REIT / PNIZF: fila "A" en DETALLE
    const detIdx = lines.findIndex(l => l.text.includes('DETALLE') && l.text.includes('GENERACION'));
    if (detIdx !== -1) {
      for (let i = detIdx + 1; i < Math.min(detIdx + 20, lines.length); i++) {
        if (/^A\b/.test(lines[i].text)) {
          const nums = [...lines[i].text.matchAll(numPat)].map(m => parseArNum(m[0])).filter(n => n > 0);
          if (nums.length >= 3) { res.cuotapartes = nums[1]; res.navCierre = nums[2]; }
          break;
        }
      }
    }
  }

  // Ajustes — incluye todos los ítems posibles de todos los fondos.
  // Los que no aparecen en el PDF simplemente no matchean y se ignoran.
  // fmt: 'cn' = solo CICLO_NOVA, 'rp' = solo REIT/PNIZF, undefined = todos
  const ajSpec = [
    { key: '(+) Disponibilidades',              pat: 'DISPONIBILIDADES',          sign:  1 },
    { key: '(+) Otros créditos no corrientes',  pat: 'OTROS CREDITOS NO CORR',    sign:  1, fmt: 'rp' },
    { key: '(+) Bienes de cambio',              pat: 'BIENES DE CAMBIO',          sign:  1 },
    { key: '(+) Cuenta overnight',              pat: 'CUENTA OVERNIGHT',          sign:  1 },
    { key: '(+) Rentas a cobrar',               pat: 'RENTAS A COBRAR',           sign:  1 },
    { key: '(+) Gastos diferidos (honorarios)', pat: 'GASTOS DIFERIDOS',          sign:  1 },
    { key: '(+) Créditos',                      pat: 'CREDITOS',                  sign:  1, fmt: 'cn' },
    { key: '(+) Bony',                          pat: 'BONY',                      sign:  1, fmt: 'cn' },
    { key: '(+) Deudores por operaciones',      pat: 'DEUDORES POR OPERACION',    sign:  1, fmt: 'cn' },
    { key: '(−) Provisiones',                   pat: 'PROVISIONES',               sign: -1 },
    { key: '(−) Acreedores',                    pat: 'ACREEDORES',                sign: -1 },
    { key: '(−) Honorarios a pagar',            pat: 'HONORARIOS A PAGAR',        sign: -1 },
  ];
  for (const { key, pat, sign, fmt } of ajSpec) {
    // Filtrar por formato de PDF si corresponde
    if (fmt === 'cn' && !isCicloNovaPDF) continue;
    if (fmt === 'rp' &&  isCicloNovaPDF) continue;
    // Usar norm() para ignorar acentos al comparar
    const line = lines.find(l => norm(l.text).includes(pat));
    if (!line) continue;
    const nums = [...line.text.matchAll(numPat)];
    if (nums.length) {
      // Usar el primer número de la línea (el valor); los siguientes son % del portfolio
      const val = parseArNum(nums[0][0]) * sign;
      res.ajustes.push({ label: key, val });
      console.log('[PDF ajuste]', key, '=', val);
    }
  }

  // ── Buscar la sección INVERSIONES que precede la tabla de datos ───
  // Ignorar el "INVERSIONES" del balance sheet (no tiene Abreviatura/IsinCode cerca)
  let invIdx = -1;
  for (let i = 0; i < lines.length; i++) {
    if (/\bInversiones\b/i.test(lines[i].text)) {
      const ctx = lines.slice(i, i + 8).map(l => l.text).join(' ');
      if (ctx.includes('Abreviatura') || ctx.includes('IsinCode') ||
          (ctx.includes('Denominación') && (ctx.includes('Cantidad') || ctx.includes('Cotización')))) {
        invIdx = i;
        break;
      }
    }
  }
  console.log('[PDF] Tabla INVERSIONES en línea:', invIdx,
    invIdx >= 0 ? lines[invIdx].text.substring(0,60) : 'NO ENCONTRADA');

  if (invIdx === -1) {
    console.warn('[PDF] Sección de inversiones no encontrada.');
    return res;
  }

  // Detectar formato: REIT/PNIZF tiene "Abreviatura", Ciclo Nova tiene "IsinCode"
  const hdrCtx = lines.slice(invIdx, invIdx + 6).map(l => l.text).join(' ');
  const isCicloNova = hdrCtx.includes('IsinCode') && !hdrCtx.includes('Abreviatura');
  console.log('[PDF] Formato:', isCicloNova ? 'CICLO_NOVA' : 'REIT/PNIZF');

  // Fin de sección
  let totIdx = lines.length - 1;
  for (let i = invIdx + 2; i < lines.length; i++) {
    const t = lines[i].text.trim();
    if (t.startsWith('Total Inversiones') ||
        (t.startsWith('Total') && /\d{9,}/.test(t.replace(/\./g, '').replace(/,/g, ''))) ||
        (!isCicloNova && (t.startsWith('(1) Sobre') || t.startsWith('MONEDAS') || t.includes('Todos los importes'))) ||
        (isCicloNova && (t === 'Disponibilidades' || /^Clase (A|B|Ley)$/.test(t) || t.startsWith('La Duration')))) {
      totIdx = i; break;
    }
  }

  // Filas de datos: entre invIdx+1 y totIdx, con al menos 2 números
  const dataLines = lines.slice(invIdx + 1, totIdx).filter(l => {
    const t = l.text.trim();
    if (/^(PRIVADA|PUBLICA|PUBLICA|Inversiones)\b/i.test(t)) return false; // subsection headers
    if (t.includes('Denominación') || t.includes('Abreviatura') || t.includes('IsinCode')) return false;
    return ([...t.matchAll(numPat)] || []).length >= 2;
  });

  console.log('[PDF] Filas de datos:', dataLines.length);

  const usedTickers = new Set();

  for (const line of dataLines) {
    const t = line.text.trim();
    const nums = [...t.matchAll(numPat)].map(m => m[0]);
    let ticker = '', cierre = 0, cantidad = 0;

    if (isCicloNova) {
      // ── Formato Ciclo Nova ────────────────────────────────────────
      // Ticker = primera palabra antes de " - "
      const dashIdx = t.indexOf(' - ');
      const firstPart = dashIdx > 0 ? t.substring(0, dashIdx) : t.split(' ')[0];
      ticker = firstPart.trim().split(/\s+/)[0].replace(/^#/, '');
      // Saltar filas de subtotales de sección (primer carácter es dígito)
      if (/^\d/.test(ticker) || /[,\.]/.test(ticker)) continue;
      // Columnas: Cantidad | Cierre | Total | % | ...
      // Usamos Total / Cantidad para mayor precisión (precio en moneda del fondo)
      if (nums.length >= 3) {
        cantidad = parseArNum(nums[0]);
        const total = parseArNum(nums[2]);
        cierre = cantidad > 0 && total > 0 ? total / cantidad : parseArNum(nums[1]);
      } else if (nums.length >= 2) {
        cantidad = parseArNum(nums[0]);
        cierre   = parseArNum(nums[1]);
      }
    } else {
      // ── Formato REIT / PNIZF ─────────────────────────────────────
      // Últimos 3 números: Cotización | Cantidad | Total
      if (nums.length < 3) continue;
      cierre   = parseArNum(nums[nums.length - 3]);
      cantidad = parseArNum(nums[nums.length - 2]);

      // Ticker: última "palabra" antes de los números y el ISIN
      let textPart = t;
      [nums[nums.length-1], nums[nums.length-2], nums[nums.length-3]]
        .forEach(n => { textPart = textPart.replace(n, ' '); });

      const words = textPart.trim().split(/\s+/)
        .filter(w => w && w !== '-' && w !== '(' && w !== ')');
      if (!words.length) continue;

      const lastW = words[words.length - 1];
      const prevW = words.length >= 2 ? words[words.length - 2] : '';
      const isISIN     = /^[A-Z]{2}[A-Z0-9]{10}$/.test(lastW);
      const isTypeCode = ['MM', 'FCI', 'BOND'].includes(lastW);

      ticker = (isISIN || isTypeCode) ? prevW.replace(/^#/, '') : lastW.replace(/^#/, '');
    }

    if (!ticker || cierre <= 0 || cantidad <= 0) {
      console.log('[PDF] Fila ignorada:', t.substring(0, 80));
      continue;
    }

    // Deduplicar (ej. tres tramos UMV)
    if (usedTickers.has(ticker)) {
      const fw = t.split(/\s+/)[0]?.replace(/^#/, '') || '';
      if (fw && fw !== ticker && !usedTickers.has(fw)) {
        ticker = fw;
      } else {
        const cm = t.match(/\((\d{5,})\)/);
        ticker = cm ? ticker + '_' + cm[1] : ticker + '_' + (usedTickers.size + 1);
      }
    }

    usedTickers.add(ticker);
    res.denomMap[ticker] = t.split(/[(\-]/)[0].trim().substring(0, 60);
    res.holdings.push({ ticker, cierre, cantidad });
    console.log('[PDF] Holding:', ticker, '| cierre:', cierre, '| cant:', cantidad);
  }

  console.log('[PDF] Total:', res.holdings.length, 'instrumentos');
  return res;
}

async function confirmarCargaPDF() {
  const data   = _pdfPending;
  const fundId = state.fundId;
  if (!data || !fundId) return;

  showModal(`<div class="modal-box" style="max-width:340px;padding:40px;text-align:center">
    <div class="spinner" style="margin:0 auto 16px"></div>
    <div style="color:#9A9AA0;font-size:14px;font-weight:600">Guardando holdings…</div>
  </div>`);

  try {
    // 1. Borrar holdings anteriores de este fondo
    const del = await fetch(`${SB_URL}/holdings?fund_id=eq.${fundId}`, { method: 'DELETE', headers: SB_HDR });
    if (!del.ok && del.status !== 404) throw new Error('Error borrando holdings: ' + del.status);

    // 2. Insertar nuevos
    const newRows = data.holdings.map(h => ({ fund_id: fundId, ticker: h.ticker, cantidad: h.cantidad, cierre: h.cierre }));
    const ins = await fetch(`${SB_URL}/holdings`, {
      method: 'POST',
      headers: { ...SB_HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(newRows),
    });
    if (!ins.ok) throw new Error('Error insertando holdings: ' + ins.status);

    // 3. Actualizar funds (nav, cuotapartes, fecha, ajustes)
    const patch = {};
    if (data.navCierre)                          patch.nav_cierre  = data.navCierre;
    if (data.cuotapartes)                        patch.cuotapartes = data.cuotapartes;
    if (data.fecha)                              patch.pdf_date    = data.fecha;
    if (data.ajustes && data.ajustes.length > 0) patch.ajustes     = data.ajustes;
    if (Object.keys(patch).length) {
      await fetch(`${SB_URL}/funds?id=eq.${fundId}`, {
        method: 'PATCH',
        headers: { ...SB_HDR, 'Content-Type': 'application/json' },
        body: JSON.stringify(patch),
      });
      if (FUNDS_CONFIG[fundId]) Object.assign(FUNDS_CONFIG[fundId], {
        navCierre:   data.navCierre   ?? FUNDS_CONFIG[fundId].navCierre,
        cuotapartes: data.cuotapartes ?? FUNDS_CONFIG[fundId].cuotapartes,
        pdfDate:     data.fecha       ?? FUNDS_CONFIG[fundId].pdfDate,
      });
    }

    // 4. Actualizar ajustes en memoria (también persistido en Supabase arriba)
    if (data.ajustes && data.ajustes.length > 0) AJUSTES[fundId] = data.ajustes;

    // 5. Actualizar state.holdings
    state.holdings[fundId] = data.holdings.map(h => ({ ticker: h.ticker, cantidad: h.cantidad, cierre: h.cierre }));

    // 6. Detectar tickers nuevos (no en activos_{fundId})
    const tabla = ACTIVOS_TABLE[fundId];
    let existing = new Set();
    try {
      const ac = await sbGet(`/${tabla}?select=ticker`);
      existing = new Set(ac.map(a => a.ticker));
    } catch(e) { /* vacía */ }

    const nuevos = data.holdings.filter(h => !existing.has(h.ticker));
    if (nuevos.length > 0) {
      showActivosCMS(fundId, nuevos, data.denomMap);
    } else {
      closeModal();
      render();
    }
  } catch(e) {
    console.error('[iEB] confirmarCargaPDF:', e);
    showModal(`<div class="modal-box" style="max-width:400px;padding:32px">
      <div style="color:#D33A3F;font-size:15px;font-weight:700;margin-bottom:8px">Error al guardar</div>
      <div style="color:#9A9AA0;font-size:13px;margin-bottom:20px">${e.message}</div>
      <button class="btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`);
  }
}

function autoSuggest(ticker, denom) {
  const t = ticker.toUpperCase();
  const d = (denom || '').toUpperCase();
  // Soberanos hard dollar (AL30, AO27, GD, GE…)
  if (/^(AL|AO|GD|GE)\d+/.test(t))
    return { fuente: 'data912_arg_bonds', moneda: 'USD', lamina: 100, tipo: 'Soberano HD' };
  // Soberanos dólar linked (con D al final)
  if (/^(T\w+D|AL\w+D|AO\w+D)$/.test(t) && t.endsWith('D'))
    return { fuente: 'data912_arg_bonds', moneda: 'USD', lamina: 1, tipo: 'Soberano DL' };
  // Soberanos ARS (letras, boncaps, boncer)
  if (/^(M\d|T\d|TX|S\d|X\d|TTJ|TTS|TMG|TZX|TZV)/.test(t) && !t.endsWith('D'))
    return { fuente: 'data912_arg_notes', moneda: 'ARS', lamina: 1, tipo: 'Soberanos ARS' };
  // Money Market USD
  if (/^(BALANDP|BAVSAP|BALAN|BAVSA|ADCAP|ALLARIA|ARGENFUNDS|IAM|BAVSA|TT)/.test(t) || d.includes('MONEY MARKET') || d.includes('LIQUIDEZ DOLAR'))
    return { fuente: 'calculo MM usd', moneda: 'USD', lamina: 1, tipo: 'Money Market USD' };
  // Money Market ARS
  if (d.includes('LIQUIDEZ PESOS') || d.includes('MONEY MARKET ARS') || d.includes('AHORRO PESOS'))
    return { fuente: 'calculo MM ars', moneda: 'ARS', lamina: 1, tipo: 'Money Market ARS' };
  // Pagares USD (UMV / cheques dólar)
  if (/^(UMV|#UMV|PAGARE)/.test(t) || d.includes('UMV') || d.includes('PAGARÉ'))
    return { fuente: 'calculo devengamiento', moneda: 'USD', lamina: 1, tipo: 'Pagare USD' };
  // Pagares ARS (cheques pesos)
  if (/^#?MAV/.test(t))
    return { fuente: 'calculo devengamiento', moneda: 'ARS', lamina: 1, tipo: 'Pagare ARS' };
  // ONs hard dollar / dólar cable
  if (d.includes('ON ') || d.includes('OBLIGACI') || /^(YPF|BPCSD|GYC|HVS|JNC|MIC|MSSE|TLC|YM|TSC|CS5)/.test(t))
    return { fuente: 'data912_arg_corp', moneda: 'USD', lamina: 100, tipo: 'ON HD' };
  // Equity USA
  if (d.includes(' US') || /^(AEHR|ANET|APLD|BN|COHR|CRNT|EMR|ETN|LITE|MOD|MPC|NEE|NTR|NU|PLD|RBBN|ROK|TSSI|VLO|VRT|CORN|REET|SDSD|SIL|TBT|URA|WEAT|LOMA|TGS)$/.test(t))
    return { fuente: 'hold', moneda: 'USD', lamina: 1, tipo: 'Equity USA' };
  // CEDEARs / ADRs → Equity USA (listed on US)
  if (d.includes('CEDEAR') || d.includes('ADR') || /^(CLSD|COPXD|EWZD|GLDD|NUD|PSXD|VISTD|VSTD)$/.test(t))
    return { fuente: 'hold', moneda: 'USD', lamina: 1, tipo: 'Equity USA' };
  // Equity Argentina
  if (d.includes('ARGENTINA') || /^(A3D|ALUAD|BBARD|CEPUD|ECOGD|IEBD|PAMPD|TGSUD|GGAL|YPFD)/.test(t))
    return { fuente: 'hold', moneda: 'USD', lamina: 1, tipo: 'Equity Argentina' };
  // Commodities ETF
  if (/^(CORN|WEAT|SIL|URA|GLD|PDBC)/.test(t))
    return { fuente: 'hold', moneda: 'USD', lamina: 1, tipo: 'Commodities' };
  // Options (covered call / compra call / venta call)
  if (/^.*P\d+[A-Z]\d+$/.test(t) || d.includes('OPCION') || d.includes('OPTION'))
    return { fuente: 'hold', moneda: 'USD', lamina: 1, tipo: 'Covered Call' };
  return { fuente: 'hold', moneda: 'USD', lamina: 1, tipo: 'Equity USA' };
}

  const rows = nuevos.map((h, i) => ({
    ticker:        h.ticker,
    nombre:        document.getElementById(`c-nom-${i}`)?.value?.trim() || h.ticker,
    tipo_activo:   document.getElementById(`c-tip-${i}`)?.value || 'Equity USA',
    categoria:     document.getElementById(`c-cat-${i}`)?.value || null,
    moneda:        document.getElementById(`c-mon-${i}`)?.value || 'ARS',
    fuente_precio: document.getElementById(`c-fue-${i}`)?.value || 'hold',
    live_symbol:   document.getElementById(`c-sym-${i}`)?.value?.trim() || h.ticker,
    tasa:          parseFloat(document.getElementById(`c-tas-${i}`)?.value) || null,

    base:          document.getElementById(`c-bas-${i}`)?.value?.trim() || null,

    <div style="color:#9A9AA0;font-size:14px;font-weight:600">Guardando activos…</div>

      method: 'POST',
      headers: { ...SB_HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(rows),

        fuente: r.fuente_precio, kind,
        liveSymbol: r.live_symbol || r.ticker,
        tasa: r.tasa, lamina: r.lamina || 1,
      };
    }
    closeModal();
    render();
  } catch(e) {
    console.error('[iEB] guardarNuevosActivos:', e);
    showModal(`<div class="modal-box" style="max-width:400px;padding:32px">

      <button class="btn-secondary" onclick="closeModal()">Cerrar</button>
    </div>`);
  }
}

      <div style="display:flex;align-items:center;gap:16px;margin-bottom:24px">
        <button data-action="fund" class="back-btn">
          <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#A6E635" stroke-width="2.6" stroke-linecap="round"><path d="M15 18l-6-6 6-6"/></svg>
          Volver a cartera
        </button>
        <div style="font-size:18px;font-weight:800">${cfg.nombre || fundId} · Activos</div>
      </div>
      <div class="table-wrap" id="activos-table-wrap">
        <div class="center-msg" style="min-height:120px"><div class="spinner"></div><span>Cargando activos…</span></div>
      </div>
    </div>`;
}

async function cargarActivosTabla(fundId) {
  const tabla = ACTIVOS_TABLE[fundId];
  if (!tabla) return;
  const wrap = document.getElementById('activos-table-wrap');
  try {
    const resp = await fetch(`${SB_URL}/${tabla}?select=*&order=ticker.asc`, { headers: SB_HDR });
    if (!resp.ok) throw new Error(await resp.text());
    const activos = await resp.json();

    if (!activos.length) {
      wrap.innerHTML = `<div class="center-msg" style="min-height:80px"><span style="color:#5A5A60">Sin activos cargados para este fondo.</span></div>`;
      return;
    }

    const rows = activos.map(a => `
      <tr>
        <td><span class="ticker-chip">${a.ticker || ''}</span></td>
        <td class="denom-cell" style="max-width:200px">${a.nombre || ''}</td>
        <td>${a.tipo_activo || ''}</td>
        <td>${a.categoria || ''}</td>
        <td>
          <span class="moneda-badge" style="background:${a.moneda==='USD'?'#ECFCCB':'#EDE9FE'};color:${a.moneda==='USD'?'#3F6212':'#5B21B6'}">${a.moneda || ''}</span>
        </td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px;color:#9A9AA0">${a.fuente_precio || ''}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${a.lamina ?? ''}</td>
        <td style="font-family:'JetBrains Mono',monospace;font-size:11px">${a.base || ''}</td>
        <td>
          <button onclick="abrirEditarActivo('${fundId}','${a.ticker}')" style="background:rgba(166,230,53,0.1);border:1px solid rgba(166,230,53,0.25);color:#A6E635;padding:4px 10px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit">Editar</button>
        </td>
      </tr>`).join('');

    wrap.innerHTML = `
      <table>
        <thead>
          <tr>
            <th>Ticker</th><th>Nombre</th><th>Tipo</th><th>Categoría</th>
            <th>Moneda</th><th>Fuente precio</th><th>Lámina</th><th>Base</th><th></th>
          </tr>
        </thead>
        <tbody>${rows}</tbody>
      </table>`;
  } catch(e) {
    wrap.innerHTML = `<div class="center-msg" style="min-height:80px"><span style="color:#D33A3F">Error cargando activos: ${e.message}</span></div>`;
  }
}

async function abrirEditarActivo(fundId, ticker) {
  const tabla = ACTIVOS_TABLE[fundId];
  let a = {};
  try {
    const r = await fetch(`${SB_URL}/${tabla}?ticker=eq.${encodeURIComponent(ticker)}&select=*`, { headers: SB_HDR });
    const arr = await r.json();
    a = arr[0] || {};
  } catch(e) {}

  const TIPO_LISTA_ED = ['Commodities', 'Compra Call', 'Covered Call', 'Equity Argentina', 'Equity USA', 'Futuro de Dólar', 'Money Market ARS', 'Money Market USD', 'ON DL', 'ON HD', 'Pagare ARS', 'Pagare USD', 'Short Equity', 'Short Renta Fija', 'Soberano DL', 'Soberano HD', 'Soberanos ARS', 'Venta Call'];
  const CAT_LISTA_ED  = ['Commodities', 'Compra Call', 'Covered Call', 'Equity', 'Futuro de Dólar', 'Liquidez', 'Renta Fija', 'Short Equity', 'Short Renta Fija', 'Venta Call'];
  const FUENTE_LISTA_ED = Object.keys(FUENTE_KIND);

  const tipoOpts = TIPO_LISTA_ED.map(t => `<option value="${t}" ${t===a.tipo_activo?'selected':''}>${t}</option>`).join('');
  const catOpts  = CAT_LISTA_ED.map(c => `<option value="${c}" ${c===a.categoria?'selected':''}>${c}</option>`).join('');
  const fOpts    = FUENTE_LISTA_ED.map(f => `<option value="${f}" ${f===a.fuente_precio?'selected':''}>${f}</option>`).join('');

  showModal(`
    <div class="modal-box" style="max-width:500px">
      <div class="modal-header">
        <div>
          <div style="font-size:11px;color:#A6E635;font-weight:700;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px">Editar activo</div>
          <div style="font-size:18px;font-weight:800">${ticker}</div>
        </div>
        <button onclick="closeModal()" style="background:none;border:none;color:#9A9AA0;cursor:pointer;font-size:18px">✕</button>
      </div>
      <div class="modal-body" style="display:grid;gap:12px">
        <div>
          <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">NOMBRE</label>
          <input class="cms-input" id="ed-nom" value="${a.nombre || ''}" style="width:100%">
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">TIPO</label>
            <select class="cms-select" id="ed-tip" style="width:100%">${tipoOpts}</select>
          </div>
          <div>
            <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">CATEGORÍA</label>
            <select class="cms-select" id="ed-cat" style="width:100%"><option value="">—</option>${catOpts}</select>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">
          <div>
            <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">MONEDA</label>
            <select class="cms-select" id="ed-mon" style="width:100%">
              <option value="ARS" ${a.moneda==='ARS'?'selected':''}>ARS</option>
              <option value="USD" ${a.moneda==='USD'?'selected':''}>USD</option>
            </select>
          </div>
          <div>
            <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">BASE</label>
            <input class="cms-input" id="ed-bas" value="${a.base || ''}" placeholder="ej. 100" style="width:100%">
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:12px">
          <div>
            <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">FUENTE PRECIO</label>
            <select class="cms-select" id="ed-fue" style="width:100%">${fOpts}</select>
          </div>
          <div>
            <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">LÁMINA</label>
            <input class="cms-input" id="ed-lam" value="${a.lamina ?? 1}" placeholder="1" style="width:100%">
          </div>
          <div>
            <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">TNA %</label>
            <input class="cms-input" id="ed-tas" value="${a.tasa ?? ''}" placeholder="—" style="width:100%">
          </div>
        </div>
        <div>
          <label style="font-size:11px;color:#5A5A60;font-weight:700;display:block;margin-bottom:5px">LIVE SYMBOL</label>
          <input class="cms-input" id="ed-sym" value="${a.live_symbol || ticker}" style="width:100%;font-family:'JetBrains Mono',monospace;font-size:12px">
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn-secondary" onclick="closeModal()">Cancelar</button>
        <button class="btn-primary" onclick="guardarEditarActivo('${fundId}','${ticker}')">💾 Guardar</button>
      </div>
    </div>`);
}

async function guardarEditarActivo(fundId, ticker) {
  const tabla = ACTIVOS_TABLE[fundId];
  const updates = {
    nombre:        document.getElementById('ed-nom')?.value?.trim(),
    tipo_activo:   document.getElementById('ed-tip')?.value,
    categoria:     document.getElementById('ed-cat')?.value || null,
    moneda:        document.getElementById('ed-mon')?.value,
    fuente_precio: document.getElementById('ed-fue')?.value,
    live_symbol:   document.getElementById('ed-sym')?.value?.trim(),
    tasa:          parseFloat(document.getElementById('ed-tas')?.value) || null,
    lamina:        parseFloat(document.getElementById('ed-lam')?.value) || 1,
    base:          document.getElementById('ed-bas')?.value?.trim() || null,
  };
  try {
    const r = await fetch(`${SB_URL}/${tabla}?ticker=eq.${encodeURIComponent(ticker)}`, {
      method: 'PATCH',
      headers: { ...SB_HDR, 'Content-Type': 'application/json', 'Prefer': 'return=minimal' },
      body: JSON.stringify(updates),
    });
    if (!r.ok) throw new Error(await r.text());
    closeModal();
    cargarActivosTabla(fundId);
  } catch(e) {
    alert('Error guardando: ' + e.message);
  }
}
</script>
</body>
